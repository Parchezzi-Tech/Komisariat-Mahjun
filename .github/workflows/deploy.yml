name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none
      
      - name: Install Composer Dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Create .env file
        run: |
          cp .env.example .env
          
          # Replace variables with secrets or default values
          # Using sed with a different delimiter (|) to handle URLs/paths
          
          sed -i "s|APP_NAME=Laravel|APP_NAME='${{ secrets.APP_NAME || 'Komisariat Mahjun' }}'|g" .env
          sed -i "s|APP_ENV=local|APP_ENV=production|g" .env
          sed -i "s|APP_KEY=|APP_KEY=${{ secrets.APP_KEY }}|g" .env
          sed -i "s|APP_DEBUG=true|APP_DEBUG=${{ secrets.APP_DEBUG || 'false' }}|g" .env
          sed -i "s|APP_URL=http://localhost|APP_URL=${{ secrets.APP_URL }}|g" .env
          
          sed -i "s|DB_CONNECTION=sqlite|DB_CONNECTION=mysql|g" .env
          sed -i "s|# DB_HOST=127.0.0.1|DB_HOST=${{ secrets.DB_HOST || '127.0.0.1' }}|g" .env
          sed -i "s|# DB_PORT=3306|DB_PORT=${{ secrets.DB_PORT || '3306' }}|g" .env
          sed -i "s|# DB_DATABASE=laravel|DB_DATABASE=${{ secrets.DB_DATABASE }}|g" .env
          sed -i "s|# DB_USERNAME=root|DB_USERNAME=${{ secrets.DB_USERNAME }}|g" .env
          sed -i "s|# DB_PASSWORD=|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|g" .env

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /komisariat-mahjun.parchezzitech.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
# SUksessfully deployed to cPanel!