[phases.setup]
nixPkgs = ["php82", "php82Extensions.intl", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.bcmath", "php82Extensions.soap", "php82Extensions.exif", "php82Extensions.fileinfo", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs || composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader",
  "npm ci || npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "mkdir -p storage/framework/{sessions,views,cache}",
  "mkdir -p storage/logs",
  "mkdir -p bootstrap/cache",
  "chmod -R 775 storage bootstrap/cache",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
